<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error — Bucket Budget</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: var(--accent-red);
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }
        .error-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body class="theme-dark">
    <div class="error-page">
        <div class="error-container">
            <div class="error-code">500</div>
            <h1 class="error-title">Something Went Wrong</h1>
            <p class="error-message">
                We hit an unexpected snag on our end. Your data is safe — try heading back to the dashboard.
            </p>
            <a href="/dashboard/" class="btn btn-primary">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
