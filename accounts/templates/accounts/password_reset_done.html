<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Link Sent — Bucket Budget</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .auth-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 16px;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent-green);
            letter-spacing: 0.5px;
            margin-bottom: 32px;
            text-decoration: none;
        }

        .auth-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .auth-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .success-box {
            background-color: rgba(0, 212, 170, 0.1);
            border: 1px solid var(--accent-green);
            border-radius: var(--radius);
            padding: 16px;
            color: var(--accent-green);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            color: var(--text-primary);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 28px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <a href="/" class="auth-logo">Bucket Budget</a>

        <div class="auth-card">
            <h1 class="auth-title">Check your email</h1>
            <p class="auth-subtitle">If an account exists for that address, we've sent a password reset link.</p>

            <div class="success-box">
                The link will expire in 3 days. Check your spam folder if you don't see the email.
            </div>

            <div class="auth-footer">
                Back to <a href="/login/">Sign in</a>
            </div>
        </div>
    </div>
</body>
</html>
